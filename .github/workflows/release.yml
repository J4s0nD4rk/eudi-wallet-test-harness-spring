name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Extract version from tag
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

    - name: Build and test
      run: ./mvnw -B clean package -Drevision=${{ env.VERSION }}

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push image (version tag)
      run: |
        docker push ghcr.io/j4s0nd4rk/eudi-wallet-test-harness-spring:${{ env.VERSION }}

    - name: Push image (latest tag)
      run: |
        docker tag ghcr.io/j4s0nd4rk/eudi-wallet-test-harness-spring:${{ env.VERSION }} \
                   ghcr.io/j4s0nd4rk/eudi-wallet-test-harness-spring:latest
        docker push ghcr.io/j4s0nd4rk/eudi-wallet-test-harness-spring:latest

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        generate_release_notes: true
        tag_name: ${{ github.ref_name }}