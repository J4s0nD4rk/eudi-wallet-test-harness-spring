# Test scenarios for the EUDI Wallet Test Harness.
#
# This entry is intentionally use-case-neutral: the harness does not prescribe
# a specific credential type. Which credential is actually tested (which claims,
# which vct, which issuerCredentialConfigurationId) is determined by the project
# operating or testing the credential issuer — simply replace this example entry
# or point CREDENTIAL_CONFIG_PATH to your own file.

example_credential:
  issuerCredentialConfigurationId: "example-credential-sd-jwt"
  # dc+sd-jwt is the HAIP-/IETF-final-mandated format identifier for SD-JWT VC
  # (not the older vc+sd-jwt).
  format: "dc+sd-jwt"
  expectedVct: "https://issuer.example/credentials/example-credential/v1"
  txCodeRequired: false
  expectedClaims:
    - "exampleClaimA"
    - "exampleClaimB"
  sampleInput:
    exampleClaimA: "example-value-a"
    exampleClaimB: "example-value-b"