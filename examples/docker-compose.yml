services:
  eudi-wallet-harness:
    image: ghcr.io/j4s0nd4rk/eudi-wallet-test-harness-spring:latest
    ports:
      - "8090:8090"
    env_file:
      - ../.env
    volumes:
      - ../src/main/resources/config:/config:ro
    extra_hosts:
